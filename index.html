  <!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFinance PRO</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#128176;</text></svg>">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 16px; padding-bottom: 40px; }
        .container { max-width: 500px; margin: 0 auto; }
        header h1 { font-size: 1.6rem; color: var(--primary); text-align: center; margin-bottom: 20px; }

        /* דשבורד */
        .dashboard { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #334155; border-radius: 20px; padding: 16px; margin-bottom: 20px; }
        .main-balance { text-align: center; margin-bottom: 15px; }
        .main-balance span { font-size: 0.85rem; color: var(--text-muted); }
        .main-balance h2 { font-size: 2.2rem; font-weight: 700; margin-top: 5px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { background: rgba(255, 255, 255, 0.02); border: 1px solid #334155; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-card p { font-size: 0.75rem; color: var(--text-muted); }
        .stat-card h3 { font-size: 1rem; margin-top: 4px; }
        .full-width-card { grid-column: span 2; }

        /* לחצנים */
        .btn-toggle-form { background-color: #1e293b; border: 1px solid var(--primary); color: var(--primary); padding: 14px; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; text-align: center; margin-bottom: 15px; width: 100%; }

        /* טפסים */
        .add-form, .edit-inside-form { background-color: var(--card-bg); border-radius: 16px; padding: 16px; margin-bottom: 20px; border: 1px solid #334155; }
        .add-form { display: none; }
        .edit-inside-form { margin-top: 10px; background-color: #0f172a; padding: 12px; border-radius: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
        input, select, textarea, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background-color: #0f172a; color: white; font-size: 0.9rem; outline: none; }
        .edit-inside-form input, .edit-inside-form select { background-color: #1e293b; }
        button.btn-submit { background-color: var(--primary); color: #0f172a; font-weight: 600; cursor: pointer; border: none; margin-top: 10px; }
        button.btn-save-edit { background-color: var(--success); color: #0f172a; font-weight: 600; border: none; margin-top: 8px; padding: 8px; font-size: 0.85rem; }
        button.btn-cancel-edit { background-color: #334155; color: white; border: none; margin-top: 4px; padding: 8px; font-size: 0.85rem; }

        /* טאבים */
        .tabs { display: flex; margin-bottom: 15px; gap: 8px; background: #1e293b; padding: 4px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text-muted); }
        .tab.active { background: var(--bg-color); color: var(--primary); font-weight: bold; }

        /* אקורדיון */
        .accordion-header { background-color: #1e293b; border: 1px solid #334155; padding: 14px; border-radius: 12px; margin-top: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 500; }
        .accordion-content { display: none; padding: 8px 0; }
        .list-container { display: flex; flex-direction: column; gap: 8px; }

        /* כרטיס תנועה */
        .item-card { background-color: var(--card-bg); border: 1px solid #334155; padding: 12px; border-radius: 12px; margin-bottom: 4px; }
        .item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-weight: bold; }
        .item-details { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.8rem; color: var(--text-muted); background: rgba(0,0,0,0.1); padding: 8px; border-radius: 8px; }
        .item-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .btn-action { background: #0f172a; border: 1px solid #334155; color: var(--text-muted); padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; width: auto; }
        .btn-edit-action { color: var(--primary); border-color: rgba(56,189,248,0.3); }
        .btn-danger-action { color: var(--danger); border-color: rgba(248,113,113,0.3); }

        .income-text { color: var(--success); }
        .expense-text { color: var(--danger); }
        .loan-text { color: var(--warning); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FamilyFinance</h1>
    </header>

    <div class="dashboard">
        <div class="main-balance">
            <span>תזרים פנוי חודשי (פחות קבועות, הלוואות ומשתנות של החודש)</span>
            <h2 id="net-balance">₪0</h2>
        </div>
        <div class="stats-grid">
            <div class="stat-card">
                <p>💰 הכנסות חודשיות</p>
                <h3 id="dash-income" class="income-text">₪0</h3>
            </div>
            <div class="stat-card">
                <p>🏡 הוצאות קבועות</p>
                <h3 id="dash-fixed" class="expense-text">₪0</h3>
            </div>
            <div class="stat-card">
                <p>🛒 יורד החודש (משתנות)</p>
                <h3 id="dash-variable-monthly" class="expense-text">₪0</h3>
            </div>
            <div class="stat-card">
                <p>📉 סך הכל יתרה (משתנות)</p>
                <h3 id="dash-variable-total" class="text-muted">₪0</h3>
            </div>
            <div class="stat-card full-width-card">
                <p>🏦 יתרת חוב הלוואות כולל</p>
                <h3 id="dash-loan" class="loan-text">₪0</h3>
            </div>
        </div>
    </div>

    <button class="btn-toggle-form" onclick="var f=document.getElementById('main-form'); f.style.display=(f.style.display=='block')?'none':'block';">➕ הוספת תנועה חדשה</button>

    <div class="add-form" id="main-form">
        <div class="form-group">
            <label>מה ברצונך להוסיף?</label>
            <select id="main-type" onchange="
                document.getElementById('form-income').style.display = (this.value == 'income') ? 'block' : 'none';
                document.getElementById('form-loan').style.display = (this.value == 'loan') ? 'block' : 'none';
                document.getElementById('form-variable').style.display = (this.value == 'variable') ? 'block' : 'none';
                document.getElementById('form-fixed').style.display = (this.value == 'fixed') ? 'block' : 'none';
            ">
                <option value="income">💰 הכנסה</option>
                <option value="loan">🏦 הלוואה</option>
                <option value="variable">🛒 תשלומים שונים</option>
                <option value="fixed">🏡 הוצאה קבועה</option>
            </select>
        </div>

        <div id="form-income">
            <div class="form-group"><label>שם ההכנסה</label><input type="text" id="inc-title" placeholder="משכורת, בונוס"></div>
            <div class="form-group"><label>סכום</label><input type="number" id="inc-amount" placeholder="₪"></div>
        </div>

        <div id="form-loan" style="display:none;">
            <div class="form-group"><label>שם ההלוואה</label><input type="text" id="loan-title"></div>
            <div class="form-group"><label>החזר חודשי</label><input type="number" id="loan-amount" placeholder="₪"></div>
            <div class="form-group"><label>היכן יורד</label><input type="text" id="loan-where"></div>
            <div class="form-group"><label>ריבית (%)</label><input type="number" id="loan-interest" step="0.01"></div>
            <div class="form-group"><label>מתי יורד (יום בחודש)</label><input type="number" id="loan-day" min="1" max="31"></div>
            <div class="form-group"><label>כמה תשלומים (סך הכל)</label><input type="number" id="loan-total"></div>
            <div class="form-group"><label>תאריך מתחיל</label><input type="date" id="loan-start"></div>
        </div>

        <div id="form-variable" style="display:none;">
            <div class="form-group"><label>שם התשלום</label><input type="text" id="var-title"></div>
            <div class="form-group"><label>עלות חודשית</label><input type="number" id="var-amount" placeholder="₪"></div>
            <div class="form-group"><label>כמה תשלומים (סך הכל)</label><input type="number" id="var-total"></div>
            <div class="form-group"><label>תאריך התחלה</label><input type="date" id="var-start"></div>
        </div>

        <div id="form-fixed" style="display:none;">
            <div class="form-group"><label>שם ההוצאה</label><input type="text" id="fix-title"></div>
            <div class="form-group"><label>סכום</label><input type="number" id="fix-amount" placeholder="₪"></div>
            <div class="form-group"><label>איפה יורד</label><input type="text" id="fix-where"></div>
            <div class="form-group"><label>חודשי או שנתי</label><select id="fix-period"><option value="חודשי">חודשי</option><option value="שנתי">שנתי</option></select></div>
            <div class="form-group"><label>הערות</label><textarea id="fix-notes"></textarea></div>
        </div>

        <button class="btn-submit" onclick="addNewItem()">הוסף תנועה +</button>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-active" onclick="switchTab('active')">תנועות פעילות</div>
        <div class="tab" id="tab-archived" onclick="switchTab('archived')">ארכיון המערכת</div>
    </div>

    <div class="accordion-header" onclick="var c=document.getElementById('sec-income'); c.style.display=(c.style.display=='block')?'none':'block';">💰 הכנסות ▼</div>
    <div class="accordion-content" id="sec-income"><div id="list-income" class="list-container"></div></div>

    <div class="accordion-header" onclick="var c=document.getElementById('sec-fixed'); c.style.display=(c.style.display=='block')?'none':'block';">🏡 הוצאות קבועות ▼</div>
    <div class="accordion-content" id="sec-fixed"><div id="list-fixed" class="list-container"></div></div>

    <div class="accordion-header" onclick="var c=document.getElementById('sec-variable'); c.style.display=(c.style.display=='block')?'none':'block';">🛒 תשלומים שונים ▼</div>
    <div class="accordion-content" id="sec-variable"><div id="list-variable" class="list-container"></div></div>

    <div class="accordion-header" onclick="var c=document.getElementById('sec-loan'); c.style.display=(c.style.display=='block')?'none':'block';">🏦 הלוואות ▼</div>
    <div class="accordion-content" id="sec-loan"><div id="list-loan" class="list-container"></div></div>
</div>

<script>
    var items = [];
    var editingId = null;

    try {
        var saved = localStorage.getItem('family_finance_data');
        if (saved) {
            items = JSON.parse(saved);
        }
    } catch(e) { console.log('שגיאה בטעינת הנתונים'); }

    var currentView = 'active';

    function saveToLocalStorage() {
        try {
            localStorage.setItem('family_finance_data', JSON.stringify(items));
        } catch(e) { console.log('שגיאה בשמירת הנתונים'); }
    }

    function parseDatesAndGetLeft(startDateStr, totalPayments) {
        if (!startDateStr || !totalPayments) return { left: 0, endStr: '-' };
        var start = new Date(startDateStr);
        var total = parseInt(totalPayments);
        
        var end = new Date(start);
        end.setMonth(end.getMonth() + total);
        var endStr = end.toLocaleDateString('he-IL');

        var today = new Date();
        var diffMonths = (today.getFullYear() - start.getFullYear()) * 12 + (today.getMonth() - start.getMonth());
        var left = total - diffMonths;
        if (left < 0) left = 0;
        
        return { left: left, endStr: endStr };
    }

    function addNewItem() {
        var type = document.getElementById('main-type').value;
        var obj = { id: Date.now(), type: type, isArchived: false };

        if (type === 'income') {
            obj.title = document.getElementById('inc-title').value.trim();
            obj.amount = parseFloat(document.getElementById('inc-amount').value);
            if(!obj.title || isNaN(obj.amount)) return alert('מלא שם וסכום');
            document.getElementById('inc-title').value = ''; document.getElementById('inc-amount').value = '';
        } 
        else if (type === 'loan') {
            obj.title = document.getElementById('loan-title').value.trim();
            obj.amount = parseFloat(document.getElementById('loan-amount').value);
            obj.where = document.getElementById('loan-where').value;
            obj.interest = document.getElementById('loan-interest').value;
            obj.day = document.getElementById('loan-day').value;
            obj.total = document.getElementById('loan-total').value;
            obj.start = document.getElementById('loan-start').value;
            if(!obj.title || isNaN(obj.amount)) return alert('מלא שם וסכום');
            document.getElementById('loan-title').value=''; document.getElementById('loan-amount').value='';
            document.getElementById('loan-where').value=''; document.getElementById('loan-interest').value='';
            document.getElementById('loan-day').value=''; document.getElementById('loan-total').value='';
            document.getElementById('loan-start').value='';
        } 
        else if (type === 'variable') {
            obj.title = document.getElementById('var-title').value.trim();
            obj.amount = parseFloat(document.getElementById('var-amount').value);
            obj.total = document.getElementById('var-total').value;
            obj.start = document.getElementById('var-start').value;
            if(!obj.title || isNaN(obj.amount)) return alert('מלא שם וסכום');
            document.getElementById('var-title').value=''; document.getElementById('var-amount').value='';
            document.getElementById('var-total').value=''; document.getElementById('var-start').value='';
        } 
        else if (type === 'fixed') {
            obj.title = document.getElementById('fix-title').value.trim();
            obj.amount = parseFloat(document.getElementById('fix-amount').value);
            obj.where = document.getElementById('fix-where').value;
            obj.period = document.getElementById('fix-period').value;
            obj.notes = document.getElementById('fix-notes').value;
            if(!obj.title || isNaN(obj.amount)) return alert('מלא שם וסכום');
            document.getElementById('fix-title').value=''; document.getElementById('fix-amount').value='';
            document.getElementById('fix-where').value=''; document.getElementById('fix-notes').value='';
        }

        items.push(obj);
        saveToLocalStorage();
        document.getElementById('main-form').style.display = 'none';
        renderAll();
        document.getElementById('sec-' + type).style.display = 'block';
    }

    function archiveItem(id) {
        var idx = items.findIndex(function(i) { return i.id === id; });
        if(idx !== -1) {
            items[idx].isArchived = true;
            saveToLocalStorage();
            renderAll();
        }
    }

    function unarchiveItem(id) {
        var idx = items.findIndex(function(i) { return i.id === id; });
        if(idx !== -1) {
            items[idx].isArchived = false;
            saveToLocalStorage();
            renderAll();
        }
    }

    function deletePermanently(id) {
        if(confirm('למחוק לצמיתות מהמערכת?')) {
            items = items.filter(function(i) { return i.id !== id; });
            saveToLocalStorage();
            renderAll();
        }
    }

    function startEdit(id) {
        editingId = id;
        renderAll();
    }

    function cancelEdit() {
        editingId = null;
        renderAll();
    }

    function saveInlineEdit(id) {
        var idx = items.findIndex(function(i) { return i.id === id; });
        if (idx === -1) return;
        var item = items[idx];

        var titleVal = document.getElementById('edit-title-' + id).value.trim();
        var amountVal = parseFloat(document.getElementById('edit-amount-' + id).value);

        if (!titleVal || isNaN(amountVal)) {
            alert('נא להזין שם וסכום תקינים');
            return;
        }

        item.title = titleVal;
        item.amount = amountVal;

        if (item.type === 'fixed') {
            item.where = document.getElementById('edit-where-' + id).value;
            item.period = document.getElementById('edit-period-' + id).value;
            item.notes = document.getElementById('edit-notes-' + id).value;
        } else if (item.type === 'variable') {
            item.total = document.getElementById('edit-total-' + id).value;
            item.start = document.getElementById('edit-start-' + id).value;
        } else if (item.type === 'loan') {
            item.where = document.getElementById('edit-where-' + id).value;
            item.interest = document.getElementById('edit-interest-' + id).value;
            item.day = document.getElementById('edit-day-' + id).value;
            item.total = document.getElementById('edit-total-' + id).value;
            item.start = document.getElementById('edit-start-' + id).value;
        }

        editingId = null;
        saveToLocalStorage();
        renderAll();
    }

    function switchTab(tab) {
        currentView = tab;
        document.getElementById('tab-active').className = (tab === 'active') ? 'tab active' : 'tab';
        document.getElementById('tab-archived').className = (tab === 'archived') ? 'tab active' : 'tab';
        renderAll();
    }

    function renderAll() {
        var lInc = document.getElementById('list-income');
        var lFix = document.getElementById('list-fixed');
        var lVar = document.getElementById('list-variable');
        var lLoan = document.getElementById('list-loan');

        lInc.innerHTML = ''; lFix.innerHTML = ''; lVar.innerHTML = ''; lLoan.innerHTML = '';

        var sumInc = 0, sumFix = 0, sumVarMonthly = 0, sumVarTotalLeft = 0, sumLoanTotalLeft = 0, monthlyExpenses = 0;

        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            if (!item.isArchived) {
                if (item.type === 'income') {
                    sumInc += item.amount;
                } else if (item.type === 'fixed') {
                    var mAmount = (item.period === 'שנתי') ? (item.amount / 12) : item.amount;
                    sumFix += item.amount;
                    monthlyExpenses += mAmount;
                } else if (item.type === 'variable') {
                    var dt = parseDatesAndGetLeft(item.start, item.total);
                    sumVarTotalLeft += (item.amount * dt.left); // סך הכל יתרה כוללת של החוב
                    if(dt.left > 0) {
                        sumVarMonthly += item.amount; // כמה יורד החודש
                        monthlyExpenses += item.amount; // מוריד מהתזרים רק את החודשי!
                    }
                } else if (item.type === 'loan') {
                    var dt = parseDatesAndGetLeft(item.start, item.total);
                    sumLoanTotalLeft += (item.amount * dt.left);
                    if(dt.left > 0) monthlyExpenses += item.amount;
                }
            }
        }

        for (var j = 0; j < items.length; j++) {
            var item = items[j];
            var show = (currentView === 'active' && !item.isArchived) || (currentView === 'archived' && item.isArchived);
            
            if (show) {
                var card = document.createElement('div');
                card.className = 'item-card';

                var isEditing = (editingId === item.id);

                if (isEditing) {
                    var editHtml = '<div class="edit-inside-form">' +
                        '<div class="form-group"><label>שם / כותרת</label><input type="text" id="edit-title-' + item.id + '" value="' + item.title + '"></div>' +
                        '<div class="form-group"><label>סכום / עלות חודשית</label><input type="number" id="edit-amount-' + item.id + '" value="' + item.amount + '"></div>';

                    if (item.type === 'fixed') {
                        editHtml += '<div class="form-group"><label>איפה יורד</label><input type="text" id="edit-where-' + item.id + '" value="' + (item.where || '') + '"></div>' +
                            '<div class="form-group"><label>תדירות</label><select id="edit-period-' + item.id + '"><option value="חודשי"' + (item.period === 'חודשי' ? ' selected' : '') + '>חודשי</option><option value="שנתי"' + (item.period === 'שנתי' ? ' selected' : '') + '>שנתי</option></select></div>' +
                            '<div class="form-group"><label>הערות</label><textarea id="edit-notes-' + item.id + '">' + (item.notes || '') + '</textarea></div>';
                    } else if (item.type === 'variable') {
                        editHtml += '<div class="form-group"><label>סך תשלומים</label><input type="number" id="edit-total-' + item.id + '" value="' + (item.total || '') + '"></div>' +
                            '<div class="form-group"><label>תאריך התחלה</label><input type="date" id="edit-start-' + item.id + '" value="' + (item.start || '') + '"></div>';
                    } else if (item.type === 'loan') {
                        editHtml += '<div class="form-group"><label>היכן יורד</label><input type="text" id="edit-where-' + item.id + '" value="' + (item.where || '') + '"></div>' +
                            '<div class="form-group"><label>ריבית (%)</label><input type="number" step="0.01" id="edit-interest-' + item.id + '" value="' + (item.interest || '') + '"></div>' +
                            '<div class="form-group"><label>יום בחודש</label><input type="number" id="edit-day-' + item.id + '" value="' + (item.day || '') + '"></div>' +
                            '<div class="form-group"><label>סך תשלומים</label><input type="number" id="edit-total-' + item.id + '" value="' + (item.total || '') + '"></div>' +
                            '<div class="form-group"><label>תאריך מתחיל</label><input type="date" id="edit-start-' + item.id + '" value="' + (item.start || '') + '"></div>';
                    }

                    editHtml += '<button class="btn-save-edit" onclick="saveInlineEdit(' + item.id + ')">💾 שמור שינויים</button>' +
                        '<button class="btn-cancel-edit" onclick="cancelEdit()">ביטול</button>' +
                        '</div>';
                    card.innerHTML = editHtml;
                } else {
                    var actionButtons = '';
                    if (!item.isArchived) {
                        actionButtons = '<button class="btn-action btn-edit-action" onclick="startEdit(' + item.id + ')">✏️ עריכה</button>' +
                                        '<button class="btn-action" onclick="archiveItem(' + item.id + ')">📦 ארכיון</button>';
                    } else {
                        actionButtons = '<button class="btn-action btn-edit-action" onclick="startEdit(' + item.id + ')">✏️ עריכה</button>' +
                                        '<button class="btn-action" onclick="unarchiveItem(' + item.id + ')">🔄 החזר לתנועות</button>' +
                                        '<button class="btn-action btn-danger-action" onclick="deletePermanently(' + item.id + ')">🗑️ מחיקה סופית</button>';
                    }

                    if (item.type === 'income') {
                        card.innerHTML = '<div class="item-top"><span>' + item.title + '</span><span class="income-text">₪' + item.amount.toLocaleString() + '</span></div>' +
                                         '<div class="item-actions">' + actionButtons + '</div>';
                    } 
                    else if (item.type === 'fixed') {
                        card.innerHTML = '<div class="item-top"><span>' + item.title + '</span><span class="expense-text">₪' + item.amount.toLocaleString() + ' (' + item.period + ')</span></div>' +
                                         '<div class="item-details"><div>איפה יורד: ' + (item.where || '-') + '</div><div>הערות: ' + (item.notes || '-') + '</div></div>' +
                                         '<div class="item-actions">' + actionButtons + '</div>';
                    } 
                    else if (item.type === 'variable') {
                        var dt = parseDatesAndGetLeft(item.start, item.total);
                        card.innerHTML = '<div class="item-top"><span>' + item.title + '</span><span class="expense-text">₪' + item.amount.toLocaleString() + ' לחודש</span></div>' +
                                         '<div class="item-details">' +
                                         '<div>תשלומים: ' + item.total + '</div><div>תאריך התחלה: ' + (item.start ? new Date(item.start).toLocaleDateString('he-IL') : '-') + '</div>' +
                                         '<div>תאריך סיום: ' + dt.endStr + '</div><div style="color:var(--primary)">חודשים שנשארו: ' + dt.left + '</div>' +
                                         '</div><div class="item-actions">' + actionButtons + '</div>';
                    } 
                    else if (item.type === 'loan') {
                        var dt = parseDatesAndGetLeft(item.start, item.total);
                        card.innerHTML = '<div class="item-top"><span>' + item.title + '</span><span class="loan-text">₪' + item.amount.toLocaleString() + ' החזר</span></div>' +
                                         '<div class="item-details">' +
                                         '<div>היכן יורד: ' + (item.where || '-') + '</div><div>ריבית: ' + (item.interest || '0') + '%</div>' +
                                         '<div>מתי יורד: ' + (item.day || '-') + ' בחודש</div><div>תאריך מתחיל: ' + (item.start ? new Date(item.start).toLocaleDateString('he-IL') : '-') + '</div>' +
                                         '<div>תאריך מסתיים: ' + dt.endStr + '</div><div style="color:var(--warning)">חודשים שנותרו: ' + dt.left + '</div>' +
                                         '</div><div class="item-actions">' + actionButtons + '</div>';
                    }
                }

                if (item.type === 'income') lInc.appendChild(card);
                else if (item.type === 'fixed') lFix.appendChild(card);
                else if (item.type === 'variable') lVar.appendChild(card);
                else if (item.type === 'loan') lLoan.appendChild(card);
            }
        }

        document.getElementById('dash-income').textContent = '₪' + sumInc.toLocaleString();
        document.getElementById('dash-fixed').textContent = '₪' + sumFix.toLocaleString();
        document.getElementById('dash-variable-monthly').textContent = '₪' + sumVarMonthly.toLocaleString();
        document.getElementById('dash-variable-total').textContent = '₪' + sumVarTotalLeft.toLocaleString();
        document.getElementById('dash-loan').textContent = '₪' + sumLoanTotalLeft.toLocaleString();

        var net = sumInc - monthlyExpenses;
        document.getElementById('net-balance').textContent = '₪' + Math.round(net).toLocaleString();
        document.getElementById('net-balance').className = net >= 0 ? 'income-text' : 'expense-text';
    }

    renderAll();
</script>
</body>
</html>
