.<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FamilyFinance PRO</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#128176;</text></svg>">
    
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --success: #4ade80;
            --danger: #f87171;
            --warning: #fbbf24;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 16px; padding-bottom: 40px; }
        .container { max-width: 500px; margin: 0 auto; }
        header h1 { font-size: 1.6rem; color: var(--primary); text-align: center; margin-bottom: 20px; }

        .dashboard { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border: 1px solid #334155; border-radius: 20px; padding: 16px; margin-bottom: 20px; }
        .main-balance { text-align: center; margin-bottom: 15px; }
        .main-balance span { font-size: 0.85rem; color: var(--text-muted); }
        .main-balance h2 { font-size: 2.2rem; font-weight: 700; margin-top: 5px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { background: rgba(255, 255, 255, 0.02); border: 1px solid #334155; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-card p { font-size: 0.75rem; color: var(--text-muted); }
        .stat-card h3 { font-size: 1rem; margin-top: 4px; }

        .action-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-action-main { flex: 1; background-color: #1e293b; border: 1px solid var(--primary); color: var(--primary); padding: 12px; border-radius: 12px; font-weight: 600; font-size: 0.95rem; cursor: pointer; text-align: center; white-space: nowrap; }
        .btn-action-main.secondary { border-color: var(--text-muted); color: var(--text-color); }

        .add-form, .manage-box, .edit-inside-form { background-color: var(--card-bg); border-radius: 16px; padding: 16px; margin-bottom: 20px; border: 1px solid #334155; }
        .add-form, .manage-box { display: none; }
        .edit-inside-form { margin-top: 10px; background-color: #0f172a; padding: 12px; border-radius: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; }
        input, select, textarea, button { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background-color: #0f172a; color: white; font-size: 0.9rem; outline: none; }
        .edit-inside-form input, .edit-inside-form select { background-color: #1e293b; }
        button.btn-submit { background-color: var(--primary); color: #0f172a; font-weight: 600; cursor: pointer; border: none; margin-top: 10px; }
        button.btn-save-edit { background-color: var(--success); color: #0f172a; font-weight: 600; border: none; margin-top: 8px; padding: 8px; font-size: 0.85rem; }
        button.btn-cancel-edit { background-color: #334155; color: white; border: none; margin-top: 4px; padding: 8px; font-size: 0.85rem; }

        .cat-manager-list { margin-top: 15px; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; }
        .cat-manager-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #334155; }
        .cat-manager-item:last-child { border-bottom: none; }
        .cat-btn-group { display: flex; gap: 5px; width: auto; }
        .cat-mini-btn { padding: 4px 8px; font-size: 0.75rem; border-radius: 6px; cursor: pointer; border: 1px solid #334155; background: #0f172a; color: white; width: auto; }

        .tabs { display: flex; margin-bottom: 15px; gap: 8px; background: #1e293b; padding: 4px; border-radius: 12px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 0.9rem; color: var(--text-muted); }
        .tab.active { background: var(--bg-color); color: var(--primary); font-weight: bold; }

        .accordion-section { margin-top: 10px; }
        .accordion-header { background-color: #1e293b; border: 1px solid #334155; padding: 14px; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-weight: 500; }
        .accordion-content { display: none; padding: 8px 0; }
        .list-container { display: flex; flex-direction: column; gap: 8px; }

        .item-card { background-color: var(--card-bg); border: 1px solid #334155; padding: 12px; border-radius: 12px; margin-bottom: 4px; }
        .item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-weight: bold; }
        .item-details { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 0.8rem; color: var(--text-muted); background: rgba(0,0,0,0.1); padding: 8px; border-radius: 8px; }
        .item-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .btn-action { background: #0f172a; border: 1px solid #334155; color: var(--text-muted); padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; cursor: pointer; width: auto; }
        .btn-edit-action { color: var(--primary); border-color: rgba(56,189,248,0.3); }
        .btn-danger-action { color: var(--danger); border-color: rgba(248,113,113,0.3); }

        .income-text { color: var(--success); }
        .expense-text { color: var(--danger); }
        .loan-text { color: var(--warning); }

        .forecast-box { background-color: var(--card-bg); border: 1px solid #334155; border-radius: 16px; padding: 16px; margin-bottom: 20px; }
        .forecast-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .forecast-header span { font-size: 0.9rem; font-weight: 600; }
        .forecast-toggle-row { display: flex; justify-content: flex-end; margin: 10px 0; }
        .forecast-toggle-btn { width: auto; padding: 6px 12px; font-size: 0.75rem; background: #0f172a; border: 1px solid #334155; border-radius: 8px; cursor: pointer; }
        .forecast-chart-wrap { position: relative; }
        .forecast-chart-wrap svg { width: 100%; height: auto; display: block; overflow: visible; }
        .forecast-bar { cursor: pointer; }
        .forecast-bar:hover, .forecast-bar:focus { filter: brightness(1.2); outline: none; }
        .forecast-bar-pos { fill: var(--success); }
        .forecast-bar-neg { fill: var(--danger); }
        .forecast-zero-line { stroke: #334155; stroke-width: 1; }
        .forecast-axis-label { font-size: 7px; fill: var(--text-muted); }
        .forecast-scale-label { font-size: 6px; fill: var(--text-muted); }
        .forecast-tooltip { position: absolute; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 5px 9px; font-size: 0.75rem; pointer-events: none; white-space: nowrap; transform: translate(-50%, -110%); z-index: 10; display: none; }
        .forecast-tooltip strong { display: block; }
        .forecast-table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .forecast-table-wrap td, .forecast-table-wrap th { padding: 6px; text-align: center; border-bottom: 1px solid #334155; }
        .forecast-table-wrap th { color: var(--text-muted); font-weight: 500; font-size: 0.75rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>FamilyFinance</h1>
    </header>

    <div class="dashboard">
        <div class="main-balance">
            <span>תזרים פנוי חודשי (הכנסות פחות כל מה שיורד החודש)</span>
            <h2 id="net-balance">₪0</h2>
        </div>
        <div class="stats-grid" id="stats-grid"></div>
    </div>

    <div class="forecast-box">
        <div class="forecast-header" onclick="var c=document.getElementById('forecast-body'); c.style.display=(c.style.display==='block')?'none':'block';">
            <span>📈 תחזית יתרה פנויה - 6 חודשים קדימה ▼</span>
        </div>
        <div id="forecast-body" style="display:none;">
            <div class="forecast-toggle-row">
                <button class="forecast-toggle-btn" id="forecast-toggle-btn" onclick="toggleForecastView()">טבלה</button>
            </div>
            <div class="forecast-chart-wrap" id="forecast-chart-wrap">
                <svg id="forecast-svg" viewBox="0 0 300 170" preserveAspectRatio="xMidYMid meet"></svg>
                <div class="forecast-tooltip" id="forecast-tooltip"></div>
            </div>
            <div class="forecast-table-wrap" id="forecast-table-wrap" style="display:none;"></div>
        </div>
    </div>

    <div class="action-row">
        <button class="btn-action-main" onclick="toggleBox('main-form')">➕ הוספת תנועה</button>
        <button class="btn-action-main secondary" onclick="toggleBox('manage-box')">⚙️ ניהול קטגוריות</button>
    </div>

    <div class="manage-box" id="manage-box">
        <h3 style="font-size:1rem; margin-bottom:10px; color:var(--primary);">עריכת שמות קטגוריות קיימות</h3>
        <div class="form-group">
            <label>הכנסות</label>
            <input type="text" id="cat-name-income" onchange="updateCategoryName('income', this.value)">
        </div>
        <div class="form-group">
            <label>הוצאות קבועות</label>
            <input type="text" id="cat-name-fixed" onchange="updateCategoryName('fixed', this.value)">
        </div>
        <div class="form-group">
            <label>תשלומים שונים</label>
            <input type="text" id="cat-name-variable" onchange="updateCategoryName('variable', this.value)">
        </div>
        <div class="form-group">
            <label>הלוואות</label>
            <input type="text" id="cat-name-loan" onchange="updateCategoryName('loan', this.value)">
        </div>

        <h3 style="font-size:1rem; margin-top:20px; margin-bottom:10px; color:var(--success);">הוספת קטגוריה חדשה מותאמת אישית</h3>
        <div class="form-group">
            <label>שם הקטגוריה החדשה</label>
            <input type="text" id="new-cat-title" placeholder="למשל: רכב, חיסכון, חופשות">
        </div>
        <div class="form-group">
            <label>סוג ההתנהגות הכלכלית</label>
            <select id="new-cat-type">
                <option value="fixed">הוצאה קבועה (סכום קבוע חודשי/שנתי)</option>
                <option value="variable">תשלומים שונים (עסקאות עם תשלומים ותאריך סיום)</option>
                <option value="income">הכנסה (מוסיף לתזרים הפנוי)</option>
                <option value="dated">חיוב חד-פעמי (תאריך וסכום בלבד, למשל כרטיס אשראי)</option>
            </select>
        </div>
        <button class="btn-submit" style="background-color:var(--success);" onclick="addCustomCategory()">צור קטגוריה חדשה +</button>

        <div class="cat-manager-list" id="custom-categories-list"></div>
    </div>

    <div class="add-form" id="main-form">
        <div class="form-group">
            <label>מה ברצונך להוסיף?</label>
            <select id="main-type" onchange="switchFormType(this.value)"></select>
        </div>

        <div id="form-income">
            <div class="form-group"><label>שם / תיאור</label><input type="text" id="inc-title" placeholder="משכורת, בונוס"></div>
            <div class="form-group"><label>סכום</label><input type="number" id="inc-amount" placeholder="₪"></div>
        </div>

        <div id="form-loan" style="display:none;">
            <div class="form-group"><label>שם ההלוואה</label><input type="text" id="loan-title"></div>
            <div class="form-group"><label>סכום מקור (סך ההלוואה המקורית)</label><input type="number" id="loan-original" placeholder="₪"></div>
            <div class="form-group"><label>החזר חודשי</label><input type="number" id="loan-amount" placeholder="₪"></div>
            <div class="form-group"><label>היכן יורד</label><input type="text" id="loan-where"></div>
            <div class="form-group"><label>ריבית (%)</label><input type="number" id="loan-interest" step="0.01"></div>
            <div class="form-group"><label>מתי יורד (יום בחודש)</label><input type="number" id="loan-day" min="1" max="31" value="1"></div>
            <div class="form-group"><label>כמה תשלומים (סך הכל)</label><input type="number" id="loan-total"></div>
            <div class="form-group"><label>תאריך לקיחה / פתיחה</label><input type="date" id="loan-start"></div>
        </div>

        <div id="form-variable" style="display:none;">
            <div class="form-group"><label>שם התשלום</label><input type="text" id="var-title"></div>
            <div class="form-group"><label>סכום מקור (סך כל העסקה המקורית)</label><input type="number" id="var-original" placeholder="₪"></div>
            <div class="form-group"><label>עלות חודשית</label><input type="number" id="var-amount" placeholder="₪"></div>
            <div class="form-group"><label>כמה תשלומים (סך הכל)</label><input type="number" id="var-total"></div>
            <div class="form-group"><label>תאריך התחלה</label><input type="date" id="var-start"></div>
        </div>

        <div id="form-fixed" style="display:none;">
            <div class="form-group"><label>שם ההוצאה</label><input type="text" id="fix-title"></div>
            <div class="form-group"><label>סכום</label><input type="number" id="fix-amount" placeholder="₪"></div>
            <div class="form-group"><label>איפה יורד</label><input type="text" id="fix-where"></div>
            <div class="form-group"><label>חודשי או שנתי</label><select id="fix-period"><option value="חודשי">חודשי</option><option value="שנתי">שנתי</option></select></div>
            <div class="form-group"><label>הערות</label><textarea id="fix-notes"></textarea></div>
        </div>

        <div id="form-dated" style="display:none;">
            <div class="form-group"><label>שם ההוצאה</label><input type="text" id="dated-title" placeholder="לדוגמה: קניות בסופר"></div>
            <div class="form-group"><label>סכום</label><input type="number" id="dated-amount" placeholder="₪"></div>
            <div class="form-group"><label>תאריך החיוב</label><input type="date" id="dated-date"></div>
        </div>

        <button class="btn-submit" onclick="addNewItem()">הוסף תנועה +</button>
    </div>

    <div class="tabs">
        <div class="tab active" id="tab-active" onclick="switchTab('active')">תנועות פעילות</div>
        <div class="tab" id="tab-archived" onclick="switchTab('archived')">ארכיון המערכת</div>
    </div>

    <div id="dynamic-accordion-container"></div>
</div>

<script>
    var categoryConfig = {
        income: { label: "💰 הכנסות", baseType: "income" },
        fixed: { label: "🏡 הוצאות קבועות", baseType: "fixed" },
        variable: { label: "🛒 תשלומים שונים", baseType: "variable" },
        loan: { label: "🏦 הלוואות", baseType: "loan" }
    };

    try {
        var savedConfig = localStorage.getItem('family_finance_cat_config');
        if (savedConfig) { categoryConfig = JSON.parse(savedConfig); }
    } catch(e) { console.log('שגיאה בטעינת קטגוריות'); }

    var items = [];
    var editingId = null;
    var currentView = 'active';
    var forecastView = 'chart';

    try {
        var savedItems = localStorage.getItem('family_finance_data');
        if (savedItems) { items = JSON.parse(savedItems); }
    } catch(e) { console.log('שגיאה בטעינת הנתונים'); }

    function saveToLocalStorage() {
        try { localStorage.setItem('family_finance_data', JSON.stringify(items)); } catch(e) { console.log('שגיאה בשמירת הנתונים'); }
    }

    function saveConfigToLocalStorage() {
        try { localStorage.setItem('family_finance_cat_config', JSON.stringify(categoryConfig)); } catch(e) { console.log('שגיאה בשמירת תצורת הקטגוריות'); }
    }

    function escapeHtml(str) {
        return String(str == null ? '' : str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function toggleBox(id) {
        var el = document.getElementById(id);
        var otherId = (id === 'main-form') ? 'manage-box' : 'main-form';
        var otherEl = document.getElementById(otherId);
        otherEl.style.display = 'none';
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    function initCategoryInputs() {
        if(document.getElementById('cat-name-income')) {
            document.getElementById('cat-name-income').value = categoryConfig.income.label;
            document.getElementById('cat-name-fixed').value = categoryConfig.fixed.label;
            document.getElementById('cat-name-variable').value = categoryConfig.variable.label;
            document.getElementById('cat-name-loan').value = categoryConfig.loan.label;
        }
        
        var listContainer = document.getElementById('custom-categories-list');
        if(listContainer) {
            listContainer.innerHTML = '';
            var count = 0;
            for (var key in categoryConfig) {
                if (key !== 'income' && key !== 'fixed' && key !== 'variable' && key !== 'loan') {
                    count++;
                    if(count === 1) {
                        var h = document.createElement('h4');
                        h.style.cssText = "font-size:0.85rem; margin-bottom:8px; color:var(--text-muted);";
                        h.textContent = "קטגוריות שיצרת:";
                        listContainer.appendChild(h);
                    }
                    createCustomCatRow(key, listContainer);
                }
            }
        }
        buildFormDropdown();
    }

    function createCustomCatRow(key, container) {
        var row = document.createElement('div');
        row.className = 'cat-manager-item';
        row.innerHTML = '<span>' + escapeHtml(categoryConfig[key].label) + ' <small style="color:var(--text-muted)">(' + translateBaseType(categoryConfig[key].baseType) + ')</small></span>' +
            '<div class="cat-btn-group">' +
                '<button class="cat-mini-btn" onclick="renameCustomCategory(\'' + key + '\')">✏️ שם</button>' +
                '<button class="cat-mini-btn" style="color:var(--danger);" onclick="deleteCustomCategory(\'' + key + '\')">🗑️ מחק</button>' +
            '</div>';
        container.appendChild(row);
    }

    function translateBaseType(bt) {
        if(bt === 'income') return 'הכנסה';
        if(bt === 'fixed') return 'קבוע';
        if(bt === 'variable') return 'תשלומים';
        if(bt === 'dated') return 'חיוב חד-פעמי';
        return '';
    }

    function todayStr() {
        var d = new Date();
        var mm = ('0' + (d.getMonth() + 1)).slice(-2);
        var dd = ('0' + d.getDate()).slice(-2);
        return d.getFullYear() + '-' + mm + '-' + dd;
    }

    function updateCategoryName(key, newVal) {
        if(!newVal.trim()) return;
        categoryConfig[key].label = newVal.trim();
        saveConfigToLocalStorage();
        initCategoryInputs();
        renderAll();
    }

    function pickEmojiForCategory(title, baseType) {
        var rules = [
            { emoji: '💳', words: ['כרטיס אשראי', 'אשראי', 'כרטיס'] },
            { emoji: '🚗', words: ['רכב', 'מכונית', 'דלק', 'חניה', 'טסט'] },
            { emoji: '🏠', words: ['דירה', 'שכירות', 'משכנתא', 'בית', 'ועד בית'] },
            { emoji: '🍔', words: ['אוכל', 'מזון', 'סופר', 'מכולת', 'מסעדה', 'משלוחים'] },
            { emoji: '🏥', words: ['בריאות', 'רופא', 'תרופות', 'קופת חולים', 'שיניים'] },
            { emoji: '🎓', words: ['חינוך', 'לימודים', 'בית ספר', 'אוניברסיטה', 'קורס', 'גן'] },
            { emoji: '✈️', words: ['טיול', 'טיולים', 'חופשה', 'נסיעה', 'חול'] },
            { emoji: '🎬', words: ['בידור', 'סרטים', 'קולנוע', 'נטפליקס', 'סטרימינג', 'תיאטרון'] },
            { emoji: '🏋️', words: ['ספורט', 'חדר כושר', 'מכון כושר', 'אימון'] },
            { emoji: '👕', words: ['ביגוד', 'בגדים', 'נעליים', 'אופנה'] },
            { emoji: '💰', words: ['חיסכון', 'השקעות', 'פנסיה', 'קרן'] },
            { emoji: '📱', words: ['טלפון', 'סלולר', 'אינטרנט', 'תקשורת'] },
            { emoji: '💡', words: ['חשמל', 'מים', 'ארנונה', 'גז'] },
            { emoji: '🛡️', words: ['ביטוח'] },
            { emoji: '🎁', words: ['מתנות', 'מתנה'] },
            { emoji: '🐾', words: ['חיות', 'כלב', 'חתול', 'וטרינר'] },
            { emoji: '☕', words: ['קפה'] }
        ];
        for (var i = 0; i < rules.length; i++) {
            for (var j = 0; j < rules[i].words.length; j++) {
                if (title.indexOf(rules[i].words[j]) !== -1) return rules[i].emoji;
            }
        }
        if (baseType === 'income') return '💰';
        if (baseType === 'variable') return '🛍️';
        if (baseType === 'loan') return '🏦';
        if (baseType === 'dated') return '💳';
        return '🏷️';
    }

    function addCustomCategory() {
        var title = document.getElementById('new-cat-title').value.trim();
        var baseType = document.getElementById('new-cat-type').value;
        if(!title) return alert('נא להזין שם לקטגוריה');

        var newKey = 'custom_' + Date.now();
        var emoji = pickEmojiForCategory(title, baseType);
        categoryConfig[newKey] = { label: emoji + ' ' + title, baseType: baseType };

        document.getElementById('new-cat-title').value = '';
        saveConfigToLocalStorage();
        initCategoryInputs();
        renderAll();

    // --- ⚖️ לוגיקת חישוב מועדים ותשלומים שנותרו מעודכנת ומסונכרנת לחלוטין ---
    function getBillingRange(startDateStr, totalPayments, billingDay) {
        if (!startDateStr || !totalPayments) return null;

        var parts = startDateStr.split('-');
        var startYear = parseInt(parts[0], 10);
        var startMonth = parseInt(parts[1], 10) - 1;
        var startDay = parts[2] ? parseInt(parts[2], 10) : 1;

        var total = parseInt(totalPayments, 10);
        var bDay = billingDay ? parseInt(billingDay, 10) : 1;

        // קביעת חודש החיוב הראשון בפועל
        var firstBillingMonth = startMonth;
        if (startDay >= bDay) {
            firstBillingMonth += 1;
        }
        var firstBillingDate = new Date(startYear, firstBillingMonth, bDay);

        // קביעת תאריך חיוב אחרון (הוספת סך תשלומים פחות 1)
        var lastBillingDate = new Date(firstBillingDate.getFullYear(), firstBillingDate.getMonth() + (total - 1), bDay);

        return { first: firstBillingDate, last: lastBillingDate, bDay: bDay, total: total };
    }

    function isBillingActiveInMonth(range, year, monthIndex) {
        var firstYm = range.first.getFullYear() * 12 + range.first.getMonth();
        var lastYm = range.last.getFullYear() * 12 + range.last.getMonth();
        var targetYm = year * 12 + monthIndex;
        return targetYm >= firstYm && targetYm <= lastYm;
    }

    function parseDatesAndGetLeft(startDateStr, totalPayments, billingDay) {
        var range = getBillingRange(startDateStr, totalPayments, billingDay);
        if (!range) return { left: 0, endStr: '-' };

        var endStr = range.last.toLocaleDateString('he-IL');

        // חישוב מדויק של תשלומים שנותרו ביחס להיום
        var today = new Date();
        var todayZero = new Date(today.getFullYear(), today.getMonth(), today.getDate());

        // אם היום הנוכחי מוקדם ממועד החיוב הראשון בפועל - נשארו כל התשלומים
        if (todayZero < range.first) {
            return { left: range.total, endStr: endStr };
        }

        // חישוב מספר חודשי החיוב המלאים שעברו
        var passedMonths = (todayZero.getFullYear() - range.first.getFullYear()) * 12 + (todayZero.getMonth() - range.first.getMonth());

        // אם עברנו או הגענו ליום החיוב בחודש הנוכחי, החודש הנוכחי נחשב ככזה שירד
        if (todayZero.getDate() >= range.bDay) {
            passedMonths += 1;
        }

        var left = range.total - passedMonths;
        if (left < 0) left = 0;
        if (left > range.total) left = range.total;

        return { left: left, endStr: endStr };
    }

    function computeForecast() {
        var now = new Date();
        var months = [];
        for (var m = 0; m < 6; m++) {
            var d = new Date(now.getFullYear(), now.getMonth() + m, 1);
            var sumInc = 0, sumExp = 0;
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                if (item.isArchived) continue;
                if (item.type === 'income') {
                    sumInc += item.amount;
                } else if (item.type === 'fixed') {
                    sumExp += (item.period === 'שנתי') ? (item.amount / 12) : item.amount;
                } else if (item.type === 'variable') {
                    var range = getBillingRange(item.start, item.total, 1);
                    if (range && isBillingActiveInMonth(range, d.getFullYear(), d.getMonth())) sumExp += item.amount;
                } else if (item.type === 'loan') {
                    var range2 = getBillingRange(item.start, item.total, item.day);
                    if (range2 && isBillingActiveInMonth(range2, d.getFullYear(), d.getMonth())) sumExp += item.amount;
                } else if (item.type === 'dated') {
                    if (item.start) {
                        var itemDate = new Date(item.start);
                        if (itemDate.getFullYear() === d.getFullYear() && itemDate.getMonth() === d.getMonth()) sumExp += item.amount;
                    }
                }
            }
            months.push({ label: d.toLocaleDateString('he-IL', { month: 'short' }), net: sumInc - sumExp });
        }
        return months;
    }

    function niceRoundUp(value) {
        if (value <= 0) return 100;
        var exp = Math.floor(Math.log(value) / Math.LN10);
        var base = Math.pow(10, exp);
        var n = value / base;
        var niceN = (n <= 1) ? 1 : (n <= 2) ? 2 : (n <= 5) ? 5 : 10;
        return niceN * base;
    }

    function barPath(x, y, w, h, r, roundedEnd) {
        if (h < r * 2) r = Math.max(0, h / 2);
        if (roundedEnd === 'top') {
            return 'M' + x + ',' + (y + h) +
                ' L' + x + ',' + (y + r) +
                ' Q' + x + ',' + y + ' ' + (x + r) + ',' + y +
                ' L' + (x + w - r) + ',' + y +
                ' Q' + (x + w) + ',' + y + ' ' + (x + w) + ',' + (y + r) +
                ' L' + (x + w) + ',' + (y + h) + ' Z';
        }
        return 'M' + x + ',' + y +
            ' L' + (x + w) + ',' + y +
            ' L' + (x + w) + ',' + (y + h - r) +
            ' Q' + (x + w) + ',' + (y + h) + ' ' + (x + w - r) + ',' + (y + h) +
            ' L' + (x + r) + ',' + (y + h) +
            ' Q' + x + ',' + (y + h) + ' ' + x + ',' + (y + h - r) + ' Z';
    }

    function attachForecastHandlers(months) {
        var svg = document.getElementById('forecast-svg');
        var tooltip = document.getElementById('forecast-tooltip');
        var bars = svg.querySelectorAll('.forecast-bar');
        for (var i = 0; i < bars.length; i++) {
            (function(bar) {
                function show() {
                    var idx = parseInt(bar.getAttribute('data-idx'), 10);
                    var mo = months[idx];
                    tooltip.innerHTML = '<strong>₪' + Math.round(mo.net).toLocaleString() + '</strong>' + escapeHtml(mo.label);
                    tooltip.style.display = 'block';
                    var rect = bar.getBoundingClientRect();
                    var wrapRect = svg.parentNode.getBoundingClientRect();
                    tooltip.style.left = (rect.left - wrapRect.left + rect.width / 2) + 'px';
                    tooltip.style.top = (rect.top - wrapRect.top) + 'px';
                }
                function hide() { tooltip.style.display = 'none'; }
                bar.addEventListener('pointerenter', show);
                bar.addEventListener('pointermove', show);
                bar.addEventListener('pointerleave', hide);
                bar.addEventListener('focus', show);
                bar.addEventListener('blur', hide);
            })(bars[i]);
        }
    }

    function renderForecast() {
        var svg = document.getElementById('forecast-svg');
        var tableWrap = document.getElementById('forecast-table-wrap');
        if(!svg) return;

        var months = computeForecast();
        var maxAbs = 1;
        for (var k = 0; k < months.length; k++) { maxAbs = Math.max(maxAbs, Math.abs(months[k].net)); }
        var niceMax = niceRoundUp(maxAbs);

        var W = 300, H = 170, baselineY = 88, barMaxH = 60, barW = 26, radius = 4;
        var slot = W / months.length;
        var scale = barMaxH / niceMax;

        var parts = [];
        parts.push('<line class="forecast-zero-line" x1="0" y1="' + baselineY + '" x2="' + W + '" y2="' + baselineY + '"></line>');
        parts.push('<text class="forecast-scale-label" x="2" y="' + (baselineY - barMaxH - 3) + '">₪' + niceMax.toLocaleString() + '</text>');
        parts.push('<text class="forecast-scale-label" x="2" y="' + (baselineY + barMaxH + 8) + '">-₪' + niceMax.toLocaleString() + '</text>');

        for (var i = 0; i < months.length; i++) {
            var mo = months[i];
            var x = i * slot + (slot - barW) / 2;
            var h = Math.round(Math.abs(mo.net) * scale);
            if (h < 3) h = 3;
            var y, roundedEnd, colorClass;
            if (mo.net >= 0) { y = baselineY - h; roundedEnd = 'top'; colorClass = 'forecast-bar-pos'; }
            else { y = baselineY; roundedEnd = 'bottom'; colorClass = 'forecast-bar-neg'; }
            var d = barPath(x, y, barW, h, radius, roundedEnd);
            parts.push('<path class="forecast-bar ' + colorClass + '" data-idx="' + i + '" tabindex="0" d="' + d + '"></path>');
            parts.push('<text class="forecast-axis-label" x="' + (x + barW / 2) + '" y="' + (H - 4) + '" text-anchor="middle">' + escapeHtml(mo.label) + '</text>');
        }

        svg.innerHTML = parts.join('');
        attachForecastHandlers(months);

        var tableHtml = '<table><thead><tr><th>חודש</th><th>יתרה פנויה צפויה</th></tr></thead><tbody>';
        for (var j = 0; j < months.length; j++) {
            var m2 = months[j];
            tableHtml += '<tr><td>' + escapeHtml(m2.label) + '</td><td class="' + (m2.net >= 0 ? 'income-text' : 'expense-text') + '">₪' + Math.round(m2.net).toLocaleString() + '</td></tr>';
        }
        tableHtml += '</tbody></table>';
        tableWrap.innerHTML = tableHtml;
    }

    function renderAll() {
        rebuildAccordionContainers();

        var catStats = {};
        for (var key in categoryConfig) { catStats[key] = { monthly: 0, totalLeft: 0 }; }

        var sumInc = 0, monthlyExpenses = 0;

        for (var i = 0; i < items.length; i++) {
            var item = items[i];
            var cKey = item.displayCategory || item.type;
            if(!categoryConfig[cKey]) cKey = item.type;
            if(!catStats[cKey]) catStats[cKey] = { monthly: 0, totalLeft: 0 };

            if (!item.isArchived) {
                if (item.type === 'income') {
                    sumInc += item.amount;
                    catStats[cKey].monthly += item.amount;
                } else if (item.type === 'fixed') {
                    var mAmount = (item.period === 'שנתי') ? (item.amount / 12) : item.amount;
                    monthlyExpenses += mAmount;
                    catStats[cKey].monthly += mAmount;
                } else if (item.type === 'variable') {
                    var dt = parseDatesAndGetLeft(item.start, item.total, 1);
                    catStats[cKey].totalLeft += (item.amount * dt.left);
                    if(dt.left > 0) {
                        monthlyExpenses += item.amount;
                        catStats[cKey].monthly += item.amount;
                    }
                } else if (item.type === 'loan') {
                    var dt = parseDatesAndGetLeft(item.start, item.total, item.day);
                    catStats[cKey].totalLeft += (item.amount * dt.left);
                    if(dt.left > 0) {
                        monthlyExpenses += item.amount;
                        catStats[cKey].monthly += item.amount;
                    }
                } else if (item.type === 'dated') {
                    if (item.start) {
                        var itemDate = new Date(item.start);
                        var now = new Date();
                        if (itemDate.getFullYear() === now.getFullYear() && itemDate.getMonth() === now.getMonth()) {
                            monthlyExpenses += item.amount;
                            catStats[cKey].monthly += item.amount;
                        }
                    }
                }
            }
        }

        renderDashboardCards(catStats);
        renderForecast();

        for (var j = 0; j < items.length; j++) {
            var item = items[j];
            var cKey = item.displayCategory || item.type;
            if(!categoryConfig[cKey]) cKey = item.type;

            var show = (currentView === 'active' && !item.isArchived) || (currentView === 'archived' && item.isArchived);
            
            if (show) {
                var card = document.createElement('div');
                card.className = 'item-card';
                var isEditing = (editingId === item.id);

                if (isEditing) {
                    var editHtml = '<div class="edit-inside-form">';

                    if (item.type === 'dated') {
                        editHtml += '<div class="form-group"><label>שם ההוצאה</label><input type="text" id="edit-title-' + item.id + '" value="' + escapeHtml(item.title || '') + '"></div>' +
                            '<div class="form-group"><label>סכום</label><input type="number" id="edit-amount-' + item.id + '" value="' + item.amount + '"></div>' +
                            '<div class="form-group"><label>תאריך החיוב</label><input type="date" id="edit-date-' + item.id + '" value="' + (item.start || '') + '"></div>';
                        editHtml += '<button class="btn-save-edit" onclick="saveInlineEdit(' + item.id + ')">💾 שמור שינויים</button>' +
                            '<button class="btn-cancel-edit" onclick="cancelEdit()">ביטול</button>' +
                            '</div>';
                        card.innerHTML = editHtml;
                        var targetListEdit = document.getElementById('list-' + cKey);
                        if(targetListEdit) targetListEdit.appendChild(card);
                        continue;
                    }

                    editHtml += '<div class="form-group"><label>שם / כותרת</label><input type="text" id="edit-title-' + item.id + '" value="' + escapeHtml(item.title) + '"></div>';

                    if (item.type === 'fixed') {
                        editHtml += '<div class="form-group"><label>סכום</label><input type="number" id="edit-amount-' + item.id + '" value="' + item.amount + '"></div>' +
                            '<div class="form-group"><label>איפה יורד</label><input type="text" id="edit-where-' + item.id + '" value="' + escapeHtml(item.where || '') + '"></div>' +
                            '<div class="form-group"><label>תדירות</label><select id="edit-period-' + item.id + '"><option value="חודשי"' + (item.period === 'חודשי' ? ' selected' : '') + '>חודשי</option><option value="שנתי"' + (item.period === 'שנתי' ? ' selected' : '') + '>שנתי</option></select></div>' +
                            '<div class="form-group"><label>הערות</label><textarea id="edit-notes-' + item.id + '">' + escapeHtml(item.notes || '') + '</textarea></div>';
                    } else if (item.type === 'variable') {
                        editHtml += '<div class="form-group"><label>סכום מקור</label><input type="number" id="edit-original-' + item.id + '" value="' + (item.originalAmount || '') + '"></div>' +
                            '<div class="form-group"><label>עלות חודשית</label><input type="number" id="edit-amount-' + item.id + '" value="' + item.amount + '"></div>' +
                            '<div class="form-group"><label>סך תשלומים</label><input type="number" id="edit-total-' + item.id + '" value="' + (item.total || '') + '"></div>' +
                            '<div class="form-group"><label>תאריך התחלה</label><input type="date" id="edit-start-' + item.id + '" value="' + (item.start || '') + '"></div>';
                    } else if (item.type === 'loan') {
                        editHtml += '<div class="form-group"><label>סכום מקור</label><input type="number" id="edit-original-' + item.id + '" value="' + (item.originalAmount || '') + '"></div>' +
                            '<div class="form-group"><label>החזר חודשי</label><input type="number" id="edit-amount-' + item.id + '" value="' + item.amount + '"></div>' +
                            '<div class="form-group"><label>היכן יורד</label><input type="text" id="edit-where-' + item.id + '" value="' + escapeHtml(item.where || '') + '"></div>' +
                            '<div class="form-group"><label>ריבית (%)</label><input type="number" step="0.01" id="edit-interest-' + item.id + '" value="' + (item.interest || '') + '"></div>' +
                            '<div class="form-group"><label>יום בחודש</label><input type="number" id="edit-day-' + item.id + '" value="' + (item.day || '1') + '"></div>' +
                            '<div class="form-group"><label>סך תשלומים</label><input type="number" id="edit-total-' + item.id + '" value="' + (item.total || '') + '"></div>' +
                            '<div class="form-group"><label>תאריך מתחיל</label><input type="date" id="edit-start-' + item.id + '" value="' + (item.start || '') + '"></div>';
                    } else {
                        editHtml += '<div class="form-group"><label>סכום</label><input type="number" id="edit-amount-' + item.id + '" value="' + item.amount + '"></div>';
                    }

                    editHtml += '<button class="btn-save-edit" onclick="saveInlineEdit(' + item.id + ')">💾 שמור שינויים</button>' +
                        '<button class="btn-cancel-edit" onclick="cancelEdit()">ביטול</button>' +
                        '</div>';
                    card.innerHTML = editHtml;
                } else {
                    var actionButtons = '';
                    if (!item.isArchived) {
                        actionButtons = '<button class="btn-action btn-edit-action" onclick="startEdit(' + item.id + ')">✏️ עריכה</button>' +
                                        '<button class="btn-action" onclick="archiveItem(' + item.id + ')">📦 ארכיון</button>' +
                                        '<button class="btn-action btn-danger-action" onclick="deletePermanently(' + item.id + ')">🗑️ מחיקה</button>';
                    } else {
                        actionButtons = '<button class="btn-action btn-edit-action" onclick="startEdit(' + item.id + ')">✏️ עריכה</button>' +
                                        '<button class="btn-action" onclick="unarchiveItem(' + item.id + ')">🔄 החזר לתנועות</button>' +
                                        '<button class="btn-action btn-danger-action" onclick="deletePermanently(' + item.id + ')">🗑️ מחיקה סופית</button>';
                    }

                    if (item.type === 'income') {
                        card.innerHTML = '<div class="item-top"><span>' + escapeHtml(item.title) + '</span><span class="income-text">₪' + item.amount.toLocaleString() + '</span></div>' +
                                         '<div class="item-actions">' + actionButtons + '</div>';
                    }
                    else if (item.type === 'fixed') {
                        card.innerHTML = '<div class="item-top"><span>' + escapeHtml(item.title) + '</span><span class="expense-text">₪' + item.amount.toLocaleString() + ' (' + item.period + ')</span></div>' +
                                         '<div class="item-details"><div>איפה יורד: ' + escapeHtml(item.where || '-') + '</div><div>הערות: ' + escapeHtml(item.notes || '-') + '</div></div>' +
                                         '<div class="item-actions">' + actionButtons + '</div>';
                    }
                    else if (item.type === 'variable') {
                        var dt = parseDatesAndGetLeft(item.start, item.total, 1);
                        var origStr = item.originalAmount ? '₪' + item.originalAmount.toLocaleString() : '-';
                        card.innerHTML = '<div class="item-top"><span>' + escapeHtml(item.title) + '</span><span class="expense-text">₪' + item.amount.toLocaleString() + ' לחודש</span></div>' +
                                         '<div class="item-details">' +
                                         '<div>סכום מקור: ' + origStr + '</div><div>תשלומים: ' + item.total + '</div>' +
                                         '<div>תאריך התחלה: ' + (item.start ? new Date(item.start).toLocaleDateString('he-IL') : '-') + '</div>' +
                                         '<div>תאריך סיום: ' + dt.endStr + '</div><div style="color:var(--primary); grid-column: span 2;">חודשים שנשארו: ' + dt.left + '</div>' +
                                         '</div><div class="item-actions">' + actionButtons + '</div>';
                    } 
                    else if (item.type === 'loan') {
                        var dt = parseDatesAndGetLeft(item.start, item.total, item.day);
                        var origStr = item.originalAmount ? '₪' + item.originalAmount.toLocaleString() : '-';
                        card.innerHTML = '<div class="item-top"><span>' + escapeHtml(item.title) + '</span><span class="loan-text">₪' + item.amount.toLocaleString() + ' החזר</span></div>' +
                                         '<div class="item-details">' +
                                         '<div>סכום מקור: ' + origStr + '</div><div>היכן יורד: ' + escapeHtml(item.where || '-') + '</div>' +
                                         '<div>ריבית: ' + (item.interest || '0') + '%</div><div>חיוב חודשי: ' + (item.day || '1') + ' בחודש</div>' +
                                         '<div>תאריך פתיחה: ' + (item.start ? new Date(item.start).toLocaleDateString('he-IL') : '-') + '</div>' +
                                         '<div>חיוב אחרון: ' + dt.endStr + '</div><div style="color:var(--warning); grid-column: span 2;">חודשים שנותרו: ' + dt.left + '</div>' +
                                         '</div><div class="item-actions">' + actionButtons + '</div>';
                    }
                    else if (item.type === 'dated') {
                        var catLabel = categoryConfig[cKey] ? categoryConfig[cKey].label : '';
                        var datedTitle = item.title || catLabel;
                        var dateStr = item.start ? new Date(item.start).toLocaleDateString('he-IL') : '-';
                        card.innerHTML = '<div class="item-top"><span>' + escapeHtml(datedTitle) + '</span><span class="expense-text">₪' + item.amount.toLocaleString() + '</span></div>' +
                                         '<div class="item-details"><div>תאריך: ' + escapeHtml(dateStr) + '</div></div>' +
                                         '<div class="item-actions">' + actionButtons + '</div>';
                    }
                }

                var targetList = document.getElementById('list-' + cKey);
                if(targetList) targetList.appendChild(card);
            }
        }

        var net = sumInc - monthlyExpenses;
        document.getElementById('net-balance').textContent = '₪' + Math.round(net).toLocaleString();
        document.getElementById('net-balance').className = net >= 0 ? 'income-text' : 'expense-text';
    }

    initCategoryInputs();
    renderAll();
</script>
</body>
</html>
