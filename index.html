.<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamilyFinance PRO</title>
    <!-- Tailwind CSS עבור עיצוב מודרני ונקי -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased">

    <div class="max-w-4xl mx-auto p-4 sm:p-6 space-y-6">
        
        <!-- כותרת ראשית -->
        <header class="flex justify-between items-center bg-slate-800 p-4 rounded-2xl shadow-lg border border-slate-700">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">FamilyFinance PRO</h1>
                <p class="text-xs text-slate-400">ניהול תזרים מזומנים והלוואות חכם</p>
            </div>
            <div class="flex gap-2">
                <button onclick="openCategoryModal()" class="bg-slate-700 hover:bg-slate-600 text-xs px-3 py-2 rounded-xl transition font-medium border border-slate-600">ניהול קטגוריות</button>
                <button onclick="openTransactionModal()" class="bg-blue-600 hover:bg-blue-500 text-xs px-4 py-2 rounded-xl transition font-medium shadow-lg shadow-blue-500/20">+ הוספת תנועה</button>
            </div>
        </header>

        <!-- דשבורד / סיכום ראשי -->
        <section class="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-sm">
                <span class="text-xs text-slate-400 block">הכנסות חודשיות</span>
                <span id="total-income" class="text-lg sm:text-xl font-bold text-emerald-400">₪0</span>
            </div>
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-sm">
                <span class="text-xs text-slate-400 block">הוצאות קבועות</span>
                <span id="total-fixed" class="text-lg sm:text-xl font-bold text-rose-400">₪0</span>
            </div>
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-sm">
                <span class="text-xs text-slate-400 block">הוצאות משתנות החודש</span>
                <span id="total-variable" class="text-lg sm:text-xl font-bold text-amber-400">₪0</span>
            </div>
            <div class="bg-slate-800 p-4 rounded-2xl border border-slate-700 shadow-sm">
                <span class="text-xs text-slate-400 block">החזרי הלוואות החודש</span>
                <span id="total-loans" class="text-lg sm:text-xl font-bold text-indigo-400">₪0</span>
            </div>
        </section>

        <!-- שורת תזרים פנוי מרכזית -->
        <div class="bg-gradient-to-r from-blue-900/40 to-indigo-900/40 p-5 rounded-2xl border border-blue-500/30 flex justify-between items-center shadow-lg">
            <div>
                <span class="text-sm text-blue-200 block font-medium">תזרים פנוי אמיתי לחודש</span>
                <span class="text-xs text-slate-400">הכנסות פחות כלל ההתחייבויות וההוצאות</span>
            </div>
            <span id="net-cashflow" class="text-2xl sm:text-3xl font-extrabold text-white">₪0</span>
        </div>

        <!-- מעבר בין טאבים (פעילים / ארכיון) -->
        <div class="flex gap-2 border-b border-slate-700 pb-2">
            <button onclick="switchTab('active')" id="tab-active-btn" class="px-4 py-2 text-sm font-semibold rounded-xl bg-blue-600 text-white transition">תנועות פעילות</button>
            <button onclick="switchTab('archive')" id="tab-archive-btn" class="px-4 py-2 text-sm font-semibold rounded-xl bg-slate-800 text-slate-400 hover:text-white transition">ארכיון המערכת</button>
        </div>

        <!-- אזור הצגת התנועות (באקורדיונים לפי קטגוריות) -->
        <main id="categories-container" class="space-y-4">
            <!-- ממוזג דינמית דרך JavaScript -->
        </main>
    </div>

    <!-- מודל הוספת/עריכת תנועה -->
    <div id="transaction-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-2xl p-6 space-y-4 shadow-2xl">
            <h3 id="modal-title" class="text-lg font-bold text-white">הוספת תנועה חדשה</h3>
            <form id="transaction-form" onsubmit="handleFormSubmit(event)" class="space-y-3">
                <input type="hidden" id="item-id">
                <div>
                    <label class="text-xs text-slate-400 block mb-1">שם התנועה</label>
                    <input type="text" id="item-name" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500" placeholder="למשל: שכירות, משכנתא, סופר...">
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">קטגוריה</label>
                    <select id="item-category" onchange="handleCategoryChange()" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                        <!-- מתמלא דינמית -->
                    </select>
                </div>
                <div>
                    <label class="text-xs text-slate-400 block mb-1">סכום (₪)</label>
                    <input type="number" step="any" id="item-amount" required class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500" placeholder="0.00">
                </div>

                <!-- שדות דינמיים להוצאות קבועות (מחזוריות) -->
                <div id="field-period" class="hidden">
                    <label class="text-xs text-slate-400 block mb-1">מחזוריות</label>
                    <select id="item-period" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                        <option value="monthly">חודשי</option>
                        <option value="yearly">שנתי (יחולק אוטומטית ל-12)</option>
                    </select>
                </div>

                <!-- שדות דינמיים להלוואות ותשלומים -->
                <div id="field-loan-details" class="hidden space-y-3">
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-xs text-slate-400 block mb-1">תאריך לקיחה / התחלה</label>
                            <input type="date" id="item-start-date" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 block mb-1">יום חיוב חודשי בבנק</label>
                            <input type="number" min="1" max="31" id="item-billing-day" value="1" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-2 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                        </div>
                    </div>
                    <div id="loan-specific-fields" class="space-y-3">
                        <div>
                            <label class="text-xs text-slate-400 block mb-1">ריבית שנתית (%)</label>
                            <input type="number" step="0.01" id="item-interest" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500" placeholder="למשל: 4.85">
                        </div>
                        <div>
                            <label class="text-xs text-slate-400 block mb-1">משך ההלוואה בחודשים</label>
                            <input type="number" id="item-duration" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500" placeholder="למשל: 12">
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-2 pt-3">
                    <button type="button" onclick="closeTransactionModal()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl text-xs transition">ביטול</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-xs font-medium transition">שמור תנועה</button>
                </div>
            </form>
        </div>
    </div>

    <!-- מודל ניהול קטגוריות -->
    <div id="category-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-md rounded-2xl p-6 space-y-4 shadow-2xl">
            <h3 class="text-lg font-bold text-white">ניהול והוספת קטגוריות</h3>
            <div id="categories-list-manage" class="space-y-2 max-h-48 overflow-y-auto pr-1">
                <!-- נטען דינמית -->
            </div>
            <hr class="border-slate-700">
            <form onsubmit="handleCategoryAdd(event)" class="space-y-3">
                <h4 class="text-xs font-semibold text-slate-300">הוספת קטגוריה חדשה</h4>
                <div>
                    <input type="text" id="new-cat-name" required placeholder="שם הקטגוריה..." class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <select id="new-cat-base" class="w-full bg-slate-900 border border-slate-700 rounded-xl px-3 py-2 text-sm text-white focus:outline-none focus:border-blue-500">
                        <option value="income">סוג בסיס: הכנסה</option>
                        <option value="fixed">סוג בסיס: הוצאה קבועה</option>
                        <option value="variable">סוג בסיס: הוצאה משתנה / תשלומים</option>
                        <option value="loan">סוג בסיס: הלוואה</option>
                    </select>
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" onclick="closeCategoryModal()" class="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl text-xs transition">סגור</button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl text-xs font-medium transition">הוסף קטגוריה</button>
                </div>
            </form>
        </div>
    </div>

    <!-- לוגיקת ה-JavaScript המלאה -->
    <script>
        // מצב אפליקציה ואחסון מקומי
        let state = JSON.parse(localStorage.getItem('family_finance_state')) || {
            currentTab: 'active',
            categories: [
                { id: 'cat_income', name: 'הכנסות שוטפות', baseType: 'income', isDefault: true },
                { id: 'cat_fixed', name: 'הוצאות קבועות', baseType: 'fixed', isDefault: true },
                { id: 'cat_variable', name: 'תשלומים ומשתנות', baseType: 'variable', isDefault: true },
                { id: 'cat_loans', name: 'הלוואות והחזרים', baseType: 'loan', isDefault: true }
            ],
            items: []
        };

        function saveState() {
            localStorage.setItem('family_finance_state', JSON.stringify(state));
            render();
        }

        function getBaseCategory(catId) {
            const cat = state.categories.find(c => c.id === catId);
            return cat ? cat.baseType : 'fixed';
        }

        // חישוב לוח שפיצר והחזר חודשי
        function calculateSpitzerPayment(principal, annualRate, months) {
            if (!annualRate || annualRate <= 0) return principal / months;
            let monthlyRate = (annualRate / 100) / 12;
            let payment = principal * (monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
            return Math.round(payment);
        }

        // בדיקת פעילות הלוואה בחודש הנוכחי לפי חוקי מועדים
        function isLoanActiveThisMonth(item) {
            if (!item.startDate) return true;
            let start = new Date(item.startDate);
            let now = new Date();
            let billingDay = item.billingDay || 1;

            // חוק חישוב חיוב ראשון
            let firstBilling = new Date(start.getFullYear(), start.getMonth(), billingDay);
            if (start.getDate() >= billingDay) {
                firstBilling.setMonth(firstBilling.getMonth() + 1);
            }

            // חוק תאריך סיום (חודש אחד פחות)
            let duration = parseInt(item.duration) || 12;
            let lastBilling = new Date(firstBilling);
            lastBilling.setMonth(lastBilling.getMonth() + duration - 1);

            let currentMonthCompare = new Date(now.getFullYear(), now.getMonth(), billingDay);
            return currentMonthCompare >= firstBilling && currentMonthCompare <= lastBilling;
        }

        function isItemActiveThisMonth(item) {
            const base = getBaseCategory(item.categoryId);
            if (base === 'loan') return isLoanActiveThisMonth(item);
            return true;
        }

        // עדכון דשבורד מרכזי עם התיקון המלא (סינון ארכיון + המרה למספרים)
        function updateDashboard() {
            const activeItems = state.items.filter(item => !item.archived);

            const totalIncome = activeItems
                .filter(item => getBaseCategory(item.categoryId) === 'income')
                .reduce((sum, item) => sum + (parseFloat(item.amount) || 0), 0);

            const totalFixed = activeItems
                .filter(item => getBaseCategory(item.categoryId) === 'fixed')
                .reduce((sum, item) => {
                    let amount = parseFloat(item.amount) || 0;
                    if (item.period === 'yearly') amount = amount / 12;
                    return sum + amount;
                }, 0);

            const totalVariable = activeItems
                .filter(item => getBaseCategory(item.categoryId) === 'variable')
                .reduce((sum, item) => {
                    if (isItemActiveThisMonth(item)) {
                        return sum + (parseFloat(item.monthlyPayment) || parseFloat(item.amount) || 0);
                    }
                    return sum;
                }, 0);

            const totalLoans = activeItems
                .filter(item => getBaseCategory(item.categoryId) === 'loan')
                .reduce((sum, item) => {
                    if (isLoanActiveThisMonth(item)) {
                        return sum + (parseFloat(item.monthlyPayment) || 0);
                    }
                    return sum;
                }, 0);

            const netCashFlow = totalIncome - (totalFixed + totalVariable + totalLoans);

            document.getElementById('total-income').textContent = `₪${totalIncome.toLocaleString('he-IL', {maximumFractionDigits: 2})}`;
            document.getElementById('total-fixed').textContent = `₪${totalFixed.toLocaleString('he-IL', {maximumFractionDigits: 2})}`;
            document.getElementById('total-variable').textContent = `₪${totalVariable.toLocaleString('he-IL', {maximumFractionDigits: 2})}`;
            document.getElementById('total-loans').textContent = `₪${totalLoans.toLocaleString('he-IL', {maximumFractionDigits: 2})}`;
            document.getElementById('net-cashflow').textContent = `₪${netCashFlow.toLocaleString('he-IL', {maximumFractionDigits: 2})}`;
        }

        // רינדור ממשק המשתמש
        function render() {
            updateDashboard();
            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            const filteredItems = state.items.filter(item => state.currentTab === 'archive' ? item.archived : !item.archived);

            state.categories.forEach(cat => {
                const catItems = filteredItems.filter(item => item.categoryId === cat.id);
                
                let html = `
                    <div class="bg-slate-800 border border-slate-700 rounded-2xl overflow-hidden shadow-sm">
                        <div class="p-4 bg-slate-800/80 flex justify-between items-center border-b border-slate-700/50">
                            <h2 class="font-bold text-sm text-slate-200">${cat.name} (${catItems.length})</h2>
                            <span class="text-xs text-slate-400">סוג: ${cat.baseType}</span>
                        </div>
                        <div class="divide-y divide-slate-700/40">
                `;

                if (catItems.length === 0) {
                    html += `<div class="p-4 text-center text-xs text-slate-500">אין תנועות בקטגוריה זו</div>`;
                } else {
                    catItems.forEach(item => {
                        let subDetails = '';
                        if (cat.baseType === 'loan') {
                            subDetails = `החזר חודשי: ₪${item.monthlyPayment || item.amount}`;
                        } else if (cat.baseType === 'fixed' && item.period === 'yearly') {
                            subDetails = `שנתי (כ-₪${Math.round((item.amount/12))} לחודש)`;
                        }

                        html += `
                            <div class="p-4 flex justify-between items-center hover:bg-slate-700/20 transition">
                                <div>
                                    <div class="font-medium text-sm text-white">${item.name}</div>
                                    <div class="text-xs text-slate-400">${subDetails}</div>
                                </div>
                                <div class="flex items-center gap-3">
                                    <span class="font-bold text-sm text-slate-200">₪${parseFloat(item.amount).toLocaleString()}</span>
                                    <div class="flex gap-1">
                                        <button onclick="toggleArchive('${item.id}')" class="text-xs bg-slate-700 hover:bg-slate-600 px-2 py-1 rounded-lg text-slate-300 transition">${item.archived ? 'שחזר' : 'ארכיון'}</button>
                                        <button onclick="deleteItem('${item.id}')" class="text-xs bg-rose-900/40 hover:bg-rose-900/60 px-2 py-1 rounded-lg text-rose-300 transition">מחק</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }

                html += `</div></div>`;
                container.innerHTML += html;
            });
        }

        function switchTab(tab) {
            state.currentTab = tab;
            document.getElementById('tab-active-btn').className = tab === 'active' ? 'px-4 py-2 text-sm font-semibold rounded-xl bg-blue-600 text-white transition' : 'px-4 py-2 text-sm font-semibold rounded-xl bg-slate-800 text-slate-400 hover:text-white transition';
            document.getElementById('tab-archive-btn').className = tab === 'archive' ? 'px-4 py-2 text-sm font-semibold rounded-xl bg-blue-600 text-white transition' : 'px-4 py-2 text-sm font-semibold rounded-xl bg-slate-800 text-slate-400 hover:text-white transition';
            render();
        }

        // ניהול מודלים
        function openTransactionModal() {
            document.getElementById('transaction-form').reset();
            document.getElementById('item-id').value = '';
            document.getElementById('modal-title').textContent = 'הוספת תנועה חדשה';
            
            const select = document.getElementById('item-category');
            select.innerHTML = state.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            
            handleCategoryChange();
            document.getElementById('transaction-modal').classList.remove('hidden');
            document.getElementById('transaction-modal').classList.add('flex');
        }

        function closeTransactionModal() {
            document.getElementById('transaction-modal').classList.add('hidden');
            document.getElementById('transaction-modal').classList.remove('flex');
        }

        function handleCategoryChange() {
            const catId = document.getElementById('item-category').value;
            const base = getBaseCategory(catId);
            
            document.getElementById('field-period').classList.toggle('hidden', base !== 'fixed');
            document.getElementById('field-loan-details').classList.toggle('hidden', base !== 'loan');
            document.getElementById('loan-specific-fields').classList.toggle('hidden', base !== 'loan');
        }

        function handleFormSubmit(event) {
            event.preventDefault();
            const catId = document.getElementById('item-category').value;
            const base = getBaseCategory(catId);
            const amount = parseFloat(document.getElementById('item-amount').value) || 0;

            let newItem = {
                id: 'item_' + Date.now(),
                name: document.getElementById('item-name').value,
                categoryId: catId,
                amount: amount,
                archived: false
            };

            if (base === 'fixed') {
                newItem.period = document.getElementById('item-period').value;
            } else if (base === 'loan') {
                newItem.startDate = document.getElementById('item-start-date').value;
                newItem.billingDay = parseInt(document.getElementById('item-billing-day').value) || 1;
                newItem.interest = parseFloat(document.getElementById('item-interest').value) || 0;
                newItem.duration = parseInt(document.getElementById('item-duration').value) || 12;
                newItem.monthlyPayment = calculateSpitzerPayment(amount, newItem.interest, newItem.duration);
            }

            state.items.push(newItem);
            saveState();
            closeTransactionModal();
        }

        function toggleArchive(id) {
            const item = state.items.find(i => i.id === id);
            if (item) {
                item.archived = !item.archived;
                saveState();
            }
        }

        function deleteItem(id) {
            if (confirm('האם אתה নিশ্চিত שברצונך למחוק תנועה זו?')) {
                state.items = state.items.filter(i => i.id !== id);
                saveState();
            }
        }

        function openCategoryModal() {
            updateCategoryManageList();
            document.getElementById('category-modal').classList.remove('hidden');
            document.getElementById('category-modal').classList.add('flex');
        }

        function closeCategoryModal() {
            document.getElementById('category-modal').classList.add('hidden');
            document.getElementById('category-modal').classList.remove('flex');
        }

        function updateCategoryManageList() {
            const list = document.getElementById('categories-list-manage');
            list.innerHTML = state.categories.map(c => `
                <div class="flex justify-between items-center bg-slate-900 p-2 rounded-xl text-xs border border-slate-700">
                    <span>${c.name} (${c.baseType})</span>
                    ${!c.isDefault ? `<button onclick="deleteCategory('${c.id}')" class="text-rose-400 hover:text-rose-300">מחק</button>` : '<span class="text-slate-500">ברירת מחדל</span>'}
                </div>
            `).join('');
        }

        function handleCategoryAdd(event) {
            event.preventDefault();
            const name = document.getElementById('new-cat-name').value;
            const baseType = document.getElementById('new-cat-base').value;

            state.categories.push({
                id: 'cat_' + Date.now(),
                name: name,
                baseType: baseType,
                isDefault: false
            });

            saveState();
            document.getElementById('new-cat-name').value = '';
            updateCategoryManageList();
        }

        function deleteCategory(id) {
            state.categories = state.categories.filter(c => c.id !== id);
            state.items.forEach(i => {
                if (i.categoryId === id) i.categoryId = state.categories[0].id;
            });
            saveState();
            updateCategoryManageList();
        }

        // הרצה ראשונית
        render();
    </script>
</body>
</html>
